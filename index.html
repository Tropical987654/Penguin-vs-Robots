<!DOCTYPE html>
<html>
<head>
    <title>POWER WASH PRO - BOGDAN EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; font-family: sans-serif; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        #water-stream { position: absolute; top: 55%; left: 50%; width: 4px; height: 150px; background: rgba(0, 150, 255, 0.5); display: none; transform: translateX(-50%); pointer-events: none;}
    </style>
</head>
<body>

<div id="ui">
    <h1>PROFESSIONAL POWER WASH 🚿</h1>
    <p>Очищено: <span id="percent">0</span>%</p>
    <p>Зажми ЛКМ, чтобы включить ВОДОМЕТ!</p>
</div>
<div id="crosshair"></div>
<div id="water-stream"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls, loader = new THREE.GLTFLoader();
let raycaster = new THREE.Raycaster();
let isWashing = false, dirtTotal = 0, dirtRemoved = 0;
let gunModel; // Крутая 3D модель пушки

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0d8ef);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());
    document.addEventListener('mousedown', () => isWashing = true);
    document.addEventListener('mouseup', () => isWashing = false);

    // СВЕТ (Яркий, как в солнечный день)
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    let sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    // ЗАГРУЗКА ДЕТАЛИЗИРОВАННОГО ФУРГОНА
    loader.load('van_wash.glb', (gltf) => {
        scene.add(gltf.scene);
        gltf.scene.traverse(child => {
            if (child.name.includes("Dirt")) dirtTotal++;
        });
    });

    // ЗАГРУЗКА КРУТОЙ ПУШКИ В РУКИ
    loader.load('wash_gun.glb', (gltf) => {
        gunModel = gltf.scene;
        gunModel.scale.set(0.2, 0.2, 0.2); // Уменьшаем под размер руки
        gunModel.rotation.y = Math.PI; // Разворачиваем стволом вперед
        gunModel.position.set(0.6, -0.6, -1); // Ставим в правый нижний угол
        camera.add(gunModel);
        scene.add(camera);
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    
    if (controls.isLocked) {
        if(isWashing) {
            document.getElementById('water-stream').style.display = 'block';
            
            // ЛОГИКА ОЧИСТКИ ГРЯЗИ
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            let intersects = raycaster.intersectObjects(scene.children, true);
            
            if (intersects.length > 0) {
                let hit = intersects[0].object;
                // Смываем только ГРЯЗНУЮ БРОНЮ
                if (hit.name.includes("Dirt")) {
                    hit.visible = false; // Скрываем грязь
                    hit.position.set(0, -100, 0); // Убираем её из мира
                    dirtRemoved++;
                    let p = Math.floor((dirtRemoved / dirtTotal) * 100);
                    document.getElementById('percent').innerText = p;
                }
            }
        } else {
            document.getElementById('stream').style.display = 'none';
        }
    }
    
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
