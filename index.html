<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOGDAN'S KITCHEN PRO</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 5px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
        #action-text { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: yellow; font-size: 24px; text-align: center; }
        #progress-bar { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; border: 2px solid white; display: none; }
        #progress-inner { height: 100%; background: lime; width: 0%; }
    </style>
</head>
<body>

<div id="ui">
    <h1>GOLD: <span id="gold">0</span> 💰</h1>
    <h3>В РУКАХ: <span id="handItem">Пусто</span></h3>
</div>
<div id="crosshair"></div>
<div id="action-text">Нажми ЛКМ, чтобы начать</div>
<div id="progress-bar"><div id="progress-inner"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls, loader = new THREE.GLTFLoader();
let gold = 0, handItem = null, foodInHandModel = null;
let customers = [], queuePositions = [new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 3)];

// Состояния объектов
let stoveProgress = 0, isCookingBurger = false;
let ovenTimer = 0, ovenStatus = 'closed'; // closed, open_empty, cooking, ready
let fridgeStatus = 'closed'; // closed, open
let particles = [];

const clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // ЗАГРУЗКА ЗДАНИЯ (Cafe.glb с большой буквы!)
    loader.load('Cafe.glb', (gltf) => {
        scene.add(gltf.scene);
    });

    spawnCustomer();
    animate();
}

// ЭФФЕКТЫ ДЫМА/ЖАРКИ
function createSmoke(pos) {
    const geo = new THREE.SphereGeometry(0.1);
    const mat = new THREE.MeshBasicMaterial({color: 0x555555, transparent: true, opacity: 0.5});
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    scene.add(p);
    particles.push({mesh: p, life: 1.0});
}

function handleInteraction() {
    const distStove = camera.position.distanceTo(new THREE.Vector3(-5, 1.6, 5));
    const distOven = camera.position.distanceTo(new THREE.Vector3(0, 1.6, 5));
    const distFridge = camera.position.distanceTo(new THREE.Vector3(5, 1.6, 5));

    // ЛОГИКА ПЛИТЫ (БУРГЕР) - ЗАЖИМ E
    if (keys['KeyE'] && distStove < 3 && !handItem) {
        if (stoveProgress < 100) {
            isCookingBurger = true;
            stoveProgress += 0.5; // Скорость жарки
            createSmoke(new THREE.Vector3(-5, 1.3, 5));
            showProgress(stoveProgress);
            document.getElementById('action-text').innerText = "ЖАРКА...";
        } else {
            document.getElementById('action-text').innerText = "ГОТОВО! Нажми E чтобы взять";
            isCookingBurger = false;
        }
    } else {
        isCookingBurger = false;
        if (stoveProgress >= 100 && keys['KeyE'] && distStove < 3) {
            takeFood('burger');
            stoveProgress = 0;
            hideProgress();
        }
    }

    // ЛОГИКА ДУХОВКИ (ПИЦЦА) - 2 МИНУТЫ (для теста сделал 10 сек, поменяй 120000 на 10000)
    if (justPressed('KeyE') && distOven < 3) {
        if (ovenStatus === 'closed') {
            ovenStatus = 'open_empty';
            document.getElementById('action-text').innerText = "ДУХОВКА ОТКРЫТА. Положи пиццу";
        } else if (ovenStatus === 'open_empty' && handItem === 'pizza') {
            clearHand();
            ovenStatus = 'cooking';
            document.getElementById('action-text').innerText = "ПЕЧЕТСЯ (2 МИН)...";
            setTimeout(() => { ovenStatus = 'ready'; }, 10000); // 10 сек для теста
        } else if (ovenStatus === 'ready') {
            takeFood('pizza');
            ovenStatus = 'closed';
        }
    }

    // ЛОГИКА ХОЛОДИЛЬНИКА (КОЛА)
    if (justPressed('KeyE') && distFridge < 3) {
        if (fridgeStatus === 'closed') {
            fridgeStatus = 'open';
            document.getElementById('action-text').innerText = "ХОЛОДИЛЬНИК ОТКРЫТ. Возьми колу";
        } else {
            takeFood('cola');
            fridgeStatus = 'closed';
            document.getElementById('action-text').innerText = "ХОЛОДИЛЬНИК ЗАКРЫТ";
        }
    }

    // ОТДАТЬ ПЕРВОМУ КЛИЕНТУ
    if (justPressed('KeyE') && customers.length > 0) {
        const first = customers[0];
        if (camera.position.distanceTo(first.position) < 4 && handItem === first.userData.want) {
            gold += 150;
            document.getElementById('gold').innerText = gold;
            clearHand();
            scene.remove(first);
            customers.shift();
            updateQueue();
            setTimeout(spawnCustomer, 3000);
        }
    }
}

function takeFood(type) {
    clearHand();
    handItem = type;
    document.getElementById('handItem').innerText = type.toUpperCase();
    loader.load(type + '.glb', (gltf) => {
        foodInHandModel = gltf.scene;
        foodInHandModel.scale.set(0.2, 0.2, 0.2);
        foodInHandModel.position.set(0.4, -0.4, -0.8);
        camera.add(foodInHandModel);
        scene.add(camera);
    });
}

function clearHand() {
    if(foodInHandModel) camera.remove(foodInHandModel);
    handItem = null;
    document.getElementById('handItem').innerText = "Пусто";
}

function showProgress(val) {
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('progress-inner').style.width = val + '%';
}
function hideProgress() { document.getElementById('progress-bar').style.display = 'none'; }

function spawnCustomer() {
    if(customers.length >= 3) return;
    loader.load('customer.glb', (gltf) => {
        const c = gltf.scene;
        const types = ['burger', 'pizza', 'cola'];
        c.userData = { want: types[Math.floor(Math.random()*3)] };
        c.position.copy(queuePositions[customers.length]);
        scene.add(c);
        customers.push(c);
    });
}

function updateQueue() {
    customers.forEach((c, i) => { c.position.copy(queuePositions[i]); });
}

const keys = {};
const prevKeys = {};
document.addEventListener('keydown', (e) => keys[e.code] = true);
document.addEventListener('keyup', (e) => keys[e.code] = false);
function justPressed(code) { return keys[code] && !prevKeys[code]; }

function animate() {
    requestAnimationFrame(animate);
    handleInteraction();
    
    // Дым
    particles.forEach((p, i) => {
        p.life -= 0.02;
        p.mesh.position.y += 0.02;
        p.mesh.material.opacity = p.life;
        if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
    });

    if(controls.isLocked) {
        if(keys['KeyW']) controls.moveForward(0.1);
        if(keys['KeyS']) controls.moveForward(-0.1);
        if(keys['KeyA']) controls.moveRight(-0.1);
        if(keys['KeyD']) controls.moveRight(0.1);
    }

    Object.assign(prevKeys, keys);
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
