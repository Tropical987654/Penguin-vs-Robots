<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBASTIC ZOMBIE SLAYER</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
        .hud { background: rgba(255, 68, 0, 0.3); padding: 15px; border: 3px solid #ff4400; border-radius: 10px; }
        #cross { position: fixed; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #00ff00; transform: translate(-50%, -50%); border-radius: 50%; }
        #ammo-fill { width: 200px; height: 10px; background: #222; margin-top: 10px; border: 1px solid #555; }
        #ammo-bar { width: 100%; height: 100%; background: #ff4400; transition: 0.1s; }
        #msg { position: fixed; bottom: 25%; left: 50%; transform: translateX(-50%); color: #ffcc00; font-size: 24px; display: none; font-weight: bold; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 20px; }
    </style>
</head>
<body>

<div id="loading">ЗАГРУЗКА БОМБАСТИКА...</div>

<div id="ui">
    <div class="hud">
        <div style="font-size: 24px; font-weight: bold;">СЧЕТ: <span id="val">0</span></div>
        <div style="color: #00ff00; margin-top: 5px;">ОРУЖИЕ: ДРОБОВИК "БОМБАСТИК"</div>
        <div id="ammo-fill"><div id="ammo-bar"></div></div>
    </div>
</div>

<div id="msg">ПЕРЕЗАРЯДКА...</div>
<div id="cross"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.rawgit.com/mrdoob/three.js/r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, player, gun;
let ammo = 6, maxAmmo = 6, isReloading = false, score = 0;
let zombies = [], keys = {};

function init() {
    // 1. Сцена и свет
    // Делаем общий свет ярче (0.8 или 1.0 — будет светло как днем)
    const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
    scene.add(ambient);

    // Добавляем «солнце» сверху, чтобы были тени и объем
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // Фонарик у игрока (чтобы пушка всегда блестела)
    const flashLight = new THREE.PointLight(0xffaa00, 1.5, 30);
    camera.add(flashLight);

    // 2. Игрок
    player = new THREE.Group();
    player.position.set(0, 3, 10);
    scene.add(player);
    player.add(camera);

    const light = new THREE.PointLight(0xffaa00, 1.2, 50);
    camera.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 3. Окружение
    const grid = new THREE.GridHelper(200, 40, 0xff4400, 0x222222);
    scene.add(grid);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color: 0x050505}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // 4. ЗАГРУЗКА ТВОЕГО ДРОБАША
    const loader = new THREE.GLTFLoader();
    loader.load('bombastic.glb', function(gltf) {
        gun = gltf.scene;
        
        // Авто-масштаб под размер экрана
        const box = new THREE.Box3().setFromObject(gun);
        const size = box.getSize(new THREE.Vector3()).length();
        const scaleFactor = 0.8 / size; 
        gun.scale.set(scaleFactor, scaleFactor, scaleFactor);

        // Позиция "в руках"
        gun.position.set(0.6, -0.5, -1.2); 
        // Поворачиваем стволы вперед (на 90 градусов)
        gun.rotation.y = -Math.PI / 2;
        // Если он всё еще чуть-чуть не туда, попробуй добавить это:
        // gun.rotation.y = -Math.PI / 2;

        camera.add(gun);
        document.getElementById('loading').style.display = 'none';
        console.log("БОМБАСТИК ГОТОВ К БОЮ!");
    }, undefined, function(err) {
        document.getElementById('loading').innerHTML = "ОШИБКА: Файл 'bombastic.glb' не найден!<br>Положи его в папку с этим кодом.";
        console.error(err);
    });

    // 5. Спавн врагов
    setInterval(spawnZombie, 3000);

    // 6. Управление
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', shoot);
    
    renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();
    
    document.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            player.rotation.y -= e.movementX * 0.002;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
        }
    });

    animate();
}

function spawnZombie() {
    const z = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshStandardMaterial({color: 0x334422}));
    body.position.y = 1.5;
    z.add(body);
    
    const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x556633}));
    head.position.y = 3.5;
    z.add(head);

    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 20;
    z.position.set(player.position.x + Math.cos(angle)*dist, 0, player.position.z + Math.sin(angle)*dist);
    
    z.userData = { hp: 100 };
    scene.add(z);
    zombies.push(z);
}

function shoot() {
    if(isReloading || ammo <= 0 || !document.pointerLockElement || !gun) return;

    ammo--;
    document.getElementById('ammo-bar').style.width = (ammo/maxAmmo)*100 + "%";

    // Эффект отдачи
    gun.position.z += 0.2;
    setTimeout(() => { if(gun) gun.position.z -= 0.2; }, 50);

    const ray = new THREE.Raycaster();
    ray.setFromCamera({x:0, y:0}, camera);
    const hits = ray.intersectObjects(zombies, true);

    if(hits.length > 0) {
        let target = hits[0].object;
        while(target.parent !== scene) target = target.parent;
        
        target.userData.hp -= 60; // Урон дробовика
        if(target.userData.hp <= 0) {
            scene.remove(target);
            zombies = zombies.filter(z => z !== target);
            score += 100;
            document.getElementById('val').innerText = score;
        }
    }

    if(ammo === 0) reload();
}

function reload() {
    isReloading = true;
    document.getElementById('msg').style.display = 'block';
    setTimeout(() => {
        ammo = maxAmmo;
        isReloading = false;
        document.getElementById('msg').style.display = 'none';
        document.getElementById('ammo-bar').style.width = "100%";
    }, 2000);
}

function animate() {
    requestAnimationFrame(animate);
    const speed = 0.2;
    if(keys['KeyW']) player.translateZ(-speed);
    if(keys['KeyS']) player.translateZ(speed);
    if(keys['KeyA']) player.translateX(-speed);
    if(keys['KeyD']) player.translateX(speed);
    player.position.y = 3;

    zombies.forEach(z => {
        z.lookAt(player.position.x, 0, player.position.z);
        z.translateZ(0.08);
        if(z.position.distanceTo(player.position) < 2) {
            alert("Зомби тебя съели! Счёт: " + score);
            location.reload();
        }
    });

    renderer.render(scene, camera);
}

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
