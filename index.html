<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBASTIC CITY SLAYER</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        .hud { background: rgba(0, 0, 0, 0.7); padding: 15px; border: 2px solid #00ff00; border-radius: 10px; }
        #cross { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid #00ff00; transform: translate(-50%, -50%); }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #00ff00; display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 24px; }
    </style>
</head>
<body>

<div id="loading">ГОРОД СТРОИТСЯ...</div>

<div id="ui">
    <div class="hud">
        <div style="font-size: 20px;">ОЧКИ: <span id="val">0</span></div>
        <div style="color: #ff4400;">ПАТРОНЫ: <span id="ammo">6</span> / 6</div>
    </div>
</div>

<div id="cross"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.rawgit.com/mrdoob/three.js/r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, player, gun;
let ammo = 6, score = 0, zombies = [], keys = {};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); // Темно-синее ночное небо
    scene.fog = new THREE.Fog(0x020205, 10, 80);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    player = new THREE.Group();
    player.position.set(0, 2, 0);
    scene.add(player);
    player.add(camera);

    // СВЕТ
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    let sun = new THREE.DirectionalLight(0x4444ff, 0.8);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // СТРОИМ ГОРОД (Пол и здания)
    createCity();

    // ЗАГРУЗКА БОМБАСТИКА
    const loader = new THREE.GLTFLoader();
    loader.load('bombastic.glb', (gltf) => {
        gun = gltf.scene;
        gun.scale.set(0.3, 0.3, 0.3); // Подкрути размер если надо
        gun.position.set(0.5, -0.4, -0.8);
        gun.rotation.y = -Math.PI / 2; // Твой любимый поворот!
        camera.add(gun);
        document.getElementById('loading').style.display = 'none';
    }, undefined, () => {
        document.getElementById('loading').innerHTML = "ОШИБКА: НЕТ ФАЙЛА bombastic.glb!";
    });

    // Управление
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', shoot);
    renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();
    document.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            player.rotation.y -= e.movementX * 0.002;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
        }
    });

    setInterval(spawnZombie, 2000);
    animate();
}

function createCity() {
    // Делаем пол (асфальт)
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(300, 300),
        new THREE.MeshStandardMaterial({color: 0x111111})
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Загружаем твой мультяшный шедевр
    const loader = new THREE.GLTFLoader();
    loader.load('building.glb', (gltf) => {
        for(let i = 0; i < 25; i++) {
            const b = gltf.scene.clone();
            
            // Случайное место в городе
            let x = (Math.random() - 0.5) * 200;
            let z = (Math.random() - 0.5) * 200;
            if(Math.abs(x) < 15 && Math.abs(z) < 15) x += 30; // Чтоб не на голове у игрока
            
            b.position.set(x, 0, z);
            b.scale.set(1.5, 1.5, 1.5); // Если домик мелкий, сделай тут (3, 3, 3)
            b.rotation.y = Math.random() * Math.PI; // Поворачиваем домики в разные стороны
            
            scene.add(b);
        }
        console.log("ГОРОД ПОСТРОЕН ИЗ ТВОИХ ДОМОВ!");
    });
}

function spawnZombie() {
    const loader = new THREE.GLTFLoader();
    loader.load('zombie.glb', (gltf) => {
        const z = gltf.scene;
        
        // Появление в случайном месте подальше от игрока
        const angle = Math.random() * Math.PI * 2;
        const dist = 35;
        z.position.set(player.position.x + Math.cos(angle)*dist, 0, player.position.z + Math.sin(angle)*dist);
        
        z.scale.set(0.8, 0.8, 0.8); // Подбери размер под домики
        z.userData = { hp: 50 }; // Жизни зомби
        
        scene.add(z);
        zombies.push(z);
    });
}

function shoot() {
    if(ammo <= 0 || !gun) return;
    ammo--;
    document.getElementById('ammo').innerText = ammo;
    
    const ray = new THREE.Raycaster();
    ray.setFromCamera({x:0, y:0}, camera);
    const hits = ray.intersectObjects(zombies);
    if(hits.length > 0) {
        let target = hits[0].object;
        scene.remove(target);
        zombies = zombies.filter(z => z !== target);
        score += 10;
        document.getElementById('val').innerText = score;
    }
    if(ammo === 0) setTimeout(() => { ammo = 6; document.getElementById('ammo').innerText = ammo; }, 1000);
}

function animate() {
    requestAnimationFrame(animate);
    const speed = 0.15;
    if(keys['KeyW']) player.translateZ(-speed);
    if(keys['KeyS']) player.translateZ(speed);
    if(keys['KeyA']) player.translateX(-speed);
    if(keys['KeyD']) player.translateX(speed);

    zombies.forEach(z => {
        z.lookAt(player.position);
        z.translateZ(0.05);
        if(z.position.distanceTo(player.position) < 1.5) {
            alert("ТЫ ПРОИГРАЛ! ОЧКИ: " + score);
            location.reload();
        }
    });
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
