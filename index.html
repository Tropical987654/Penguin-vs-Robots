<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOGDAN'S KITCHEN - FINAL FIX</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 5px #000; z-index: 100; pointer-events: none; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; color: white;
        }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: red; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; z-index: 50; }
        #action-text { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); color: #00ff00; font-size: 24px; text-align: center; z-index: 50; }
        #progress-bar { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 300px; height: 30px; border: 3px solid white; display: none; background: rgba(0,0,0,0.5); z-index: 50; }
        #progress-inner { height: 100%; background: #ffcc00; width: 0%; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>BOGDAN'S KITCHEN 👨‍🍳</h1>
    <p>Используй код <b>RELEASE</b> для получения 500 золота!</p>
    <button id="start-btn">ИГРАТЬ (КЛИКНИ ТУТ!)</button>
</div>

<div id="ui">
    <h1>ЗОЛОТО: <span id="gold">0</span> 💰</h1>
    <h3>В РУКАХ: <span id="handItem">Ничего</span></h3>
    <p>W,A,S,D - Ходить | E - Действие | R - Телепорт</p>
</div>

<div id="crosshair"></div>
<div id="action-text"></div>
<div id="progress-bar"><div id="progress-inner"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls, loader = new THREE.GLTFLoader();
let gold = 0, handItem = null, foodInHandModel = null;
let customers = [], particles = [];
let interactiveObjects = { stove: null, oven: null, fridge: null };
let stoveProgress = 0;

// Инициализация игры
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5); // Безопасная точка появления

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);

    document.getElementById('start-btn').addEventListener('click', () => {
        controls.lock();
        document.getElementById('overlay').style.display = 'none';
    });

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // ЗАГРУЗКА МОДЕЛИ КАФЕ
    loader.load('Cafe.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);
        model.traverse((child) => {
            if (child.name.toLowerCase().includes('stove')) interactiveObjects.stove = child;
            if (child.name.toLowerCase().includes('oven')) interactiveObjects.oven = child;
            if (child.name.toLowerCase().includes('fridge')) interactiveObjects.fridge = child;
        });
    });

    spawnCustomer();
    animate();
}

// Промокод (вводить в консоль: useCode("RELEASE") )
function useCode(code) {
    if(code === "RELEASE") {
        gold += 500;
        document.getElementById('gold').innerText = gold;
        alert("Код активирован! +500 золота!");
    }
}

function handleInteraction() {
    if (!controls.isLocked) return;

    if (justPressed('KeyR')) camera.position.set(0, 2, 2);

    // Плита
    if (interactiveObjects.stove && camera.position.distanceTo(interactiveObjects.stove.getWorldPosition(new THREE.Vector3())) < 4) {
        if (keys['KeyE'] && !handItem) {
            if (stoveProgress < 100) {
                stoveProgress += 0.5;
                showProgress(stoveProgress);
                createSmoke(interactiveObjects.stove.getWorldPosition(new THREE.Vector3()).add(new THREE.Vector3(0, 1, 0)));
                document.getElementById('action-text').innerText = "ЖАРИМ...";
            }
        } else if (!keys['KeyE'] && stoveProgress >= 100) {
            if (justPressed('KeyE')) { takeFood('burger'); stoveProgress = 0; hideProgress(); }
        }
    } else {
        hideProgress();
        document.getElementById('action-text').innerText = "";
    }

    // Отдать еду
    customers.forEach((c, i) => {
        if (camera.position.distanceTo(c.position) < 4 && justPressed('KeyE')) {
            if (handItem === c.userData.want && !c.userData.isWalking) {
                gold += 150;
                document.getElementById('gold').innerText = gold;
                clearHand();
                scene.remove(c);
                customers.splice(i, 1);
                setTimeout(spawnCustomer, 3000);
            }
        }
    });
}

function spawnCustomer() {
    loader.load('customer.glb', (gltf) => {
        const c = gltf.scene;
        c.position.set((Math.random()-0.5)*2, 0, -10); 
        c.userData = { want: 'burger', targetZ: -2, isWalking: true };
        scene.add(c);
        customers.push(c);
    }, undefined, () => {
        const c = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshBasicMaterial({color: 0xff00ff}));
        c.position.set(0, 1, -10);
        c.userData = { want: 'burger', targetZ: -2, isWalking: true };
        scene.add(c);
        customers.push(c);
    });
}

function takeFood(type) {
    clearHand();
    handItem = type;
    document.getElementById('handItem').innerText = type.toUpperCase();
    // Тут можно добавить загрузку бургера burger.glb
}

function clearHand() { handItem = null; document.getElementById('handItem').innerText = "Ничего"; }
function showProgress(v) { document.getElementById('progress-bar').style.display = 'block'; document.getElementById('progress-inner').style.width = v + '%'; }
function hideProgress() { document.getElementById('progress-bar').style.display = 'none'; }
function createSmoke(pos) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x555555, transparent: true, opacity: 0.6}));
    p.position.copy(pos);
    scene.add(p);
    particles.push({mesh: p, life: 1.0});
}

const keys = {}, prevKeys = {};
document.addEventListener('keydown', (e) => keys[e.code] = true);
document.addEventListener('keyup', (e) => keys[e.code] = false);
function justPressed(c) { return keys[c] && !prevKeys[c]; }

function animate() {
    requestAnimationFrame(animate);
    handleInteraction();
    
    customers.forEach((c) => {
        if (c.userData.isWalking) {
            if (c.position.z < c.userData.targetZ) c.position.z += 0.05;
            else c.userData.isWalking = false;
        }
    });

    particles.forEach((p, i) => {
        p.life -= 0.02; p.mesh.position.y += 0.03; p.mesh.material.opacity = p.life;
        if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
    });

    if(controls.isLocked) {
        if(keys['KeyW']) controls.moveForward(0.1);
        if(keys['KeyS']) controls.moveForward(-0.1);
        if(keys['KeyA']) controls.moveRight(-0.1);
        if(keys['KeyD']) controls.moveRight(0.1);
    }
    Object.assign(prevKeys, keys);
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
