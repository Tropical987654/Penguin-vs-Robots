<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZOMBIE SURVIVAL - BOGDAN EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Comic Sans MS', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 40px; border-radius: 20px; text-align: center; display: none; pointer-events: all; }
        button { background: #4CAF50; border: none; color: white; padding: 15px 32px; font-size: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <h1>LEVEL: <span id="lvl">1</span></h1>
    <h2>HEALTH: <span id="hp">100</span>%</h2>
    <h2>GOLD: <span id="gold">0</span> | SCORE: <span id="score">0</span></h2>
</div>

<div id="crosshair"></div>

<div id="menu">
    <h1 id="menuTitle">ИГРА ОКОНЧЕНА</h1>
    <p>Твой результат: <span id="finalScore">0</span></p>
    <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls;
let gun, zombies = [], bullets = [];
let score = 0, hp = 100, gold = 0, level = 1;
let isGameOver = false;

// 1. ИНИЦИАЛИЗАЦИЯ
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Голубое небо

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => { if(!isGameOver) controls.lock(); });

    // Свет
    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // Травка
    const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshStandardMaterial({ color: 0x567d46 })
    );
    grass.rotation.x = -Math.PI / 2;
    scene.add(grass);

    // Промокод
    let code = prompt("ВВЕДИ КОД (ПОДСКАЗКА: RELEASE):");
    if(code === "RELEASE") { gold = 500; updateUI(); }

    loadAssets();
    window.addEventListener('mousedown', shoot);
    animate();
}

// 2. ЗАГРУЗКА МОДЕЛЕЙ (ТВОИХ!)
const loader = new THREE.GLTFLoader();

function loadAssets() {
    // Твой Бомбастик (Дробовик)
    loader.load('bombastic.glb', (gltf) => {
        gun = gltf.scene;
        gun.scale.set(0.5, 0.5, 0.5);
        gun.position.set(0.5, -0.5, -1);
        camera.add(gun);
        scene.add(camera);
    });

    // Твой город
    for(let i=0; i<40; i++) {
        loader.load('building.glb', (gltf) => {
            const b = gltf.scene;
            b.position.set((Math.random()-0.5)*400, 0, (Math.random()-0.5)*400);
            if(b.position.length() < 20) b.position.x += 30; 
            b.rotation.y = Math.random() * Math.PI;
            b.scale.set(3, 3, 3);
            scene.add(b);
        });
    }

    // Спавн зомби каждые 3 секунды
    setInterval(() => { if(!isGameOver) spawnZombie(); }, 3000 / (1 + level * 0.1));
}

function spawnZombie() {
    loader.load('zombie.glb', (gltf) => {
        const z = gltf.scene;
        const dist = 60;
        const angle = Math.random() * Math.PI * 2;
        z.position.set(camera.position.x + Math.cos(angle)*dist, 0, camera.position.z + Math.sin(angle)*dist);
        z.scale.set(1, 1, 1);
        z.lookAt(camera.position.x, 0, camera.position.z);
        scene.add(z);
        zombies.push(z);
    });
}

// 3. СТРЕЛЬБА
function shoot() {
    if(!controls.isLocked || isGameOver) return;

    const bGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const bMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    const b = new THREE.Mesh(bGeo, bMat);
    
    b.position.copy(camera.position);
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    b.userData.velocity = dir.multiplyScalar(2);
    
    scene.add(b);
    bullets.push(b);

    // Анимация отдачи пушки
    if(gun) {
        gun.position.z += 0.2;
        setTimeout(() => gun.position.z -= 0.2, 50);
    }
}

// 4. ГЕЙМПЛЕЙНЫЙ ЦИКЛ
function animate() {
    requestAnimationFrame(animate);
    if(isGameOver) return;

    // Пули
    bullets.forEach((b, i) => {
        b.position.add(b.userData.velocity);
        if(b.position.distanceTo(camera.position) > 100) {
            scene.remove(b);
            bullets.splice(i, 1);
        }
        
        zombies.forEach((z, zi) => {
            if(b.position.distanceTo(z.position) < 2) {
                scene.remove(z);
                zombies.splice(zi, 1);
                score += 10;
                gold += 5;
                if(score >= level * 100 && level < 30) { level++; }
                updateUI();
            }
        });
    });

    // Зомби (идут к игроку)
    zombies.forEach((z, i) => {
        const speed = 0.05 + (level * 0.01);
        z.lookAt(camera.position.x, 0, camera.position.z);
        z.translateZ(speed);

        if(z.position.distanceTo(camera.position) < 2) {
            hp -= 0.5;
            updateUI();
            if(hp <= 0) gameOver();
        }
    });

    renderer.render(scene, camera);
}

function updateUI() {
    document.getElementById('hp').innerText = Math.ceil(hp);
    document.getElementById('score').innerText = score;
    document.getElementById('gold').innerText = gold;
    document.getElementById('lvl').innerText = level;
}

function gameOver() {
    isGameOver = true;
    controls.unlock();
    document.getElementById('menu').style.display = 'block';
    document.getElementById('finalScore').innerText = score;
}

init();
</script>
</body>
</html>
