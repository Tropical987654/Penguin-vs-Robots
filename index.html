<!DOCTYPE html>
<html>
<head>
    <title>ULTRA POWER WASH - BOGDAN</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 3px 3px #000; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 3px solid #00f; border-radius: 50%; transform: translate(-50%, -50%); }
        #stream { 
            position: absolute; top: 60%; left: 50%; width: 6px; height: 200px; 
            background: linear-gradient(to top, rgba(255,255,255,0.8), rgba(0,150,255,0)); 
            display: none; transform: translateX(-50%) rotate(5deg); pointer-events: none;
        }
        #progress-container { width: 300px; height: 20px; border: 2px solid white; background: #333; margin-top: 10px; }
        #progress-fill { width: 0%; height: 100%; background: #0f0; transition: 0.1s; }
    </style>
</head>
<body>

<div id="ui">
    <h1>PROFESSIONAL POWER WASH 🚿</h1>
    <div id="progress-container"><div id="progress-fill"></div></div>
    <p>ОЧИЩЕНО: <span id="percent">0</span>%</p>
    <p>Нажми <b>E</b> чтобы включить напор!</p>
</div>

<div id="crosshair"></div>
<div id="stream"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls, loader = new THREE.GLTFLoader();
let raycaster = new THREE.Raycaster();
let isWashing = false, dirtTotal = 0, dirtRemoved = 0;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x6eb5ff);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());
    
    // Управление: ЛКМ или клавиша E
    document.addEventListener('mousedown', () => isWashing = true);
    document.addEventListener('mouseup', () => isWashing = false);

    scene.add(new THREE.AmbientLight(0xffffff, 1));

    // Загрузка нашего супер-грязного фургона
    loader.load('dirty_van.glb', (gltf) => {
        scene.add(gltf.scene);
        gltf.scene.traverse(child => {
            if (child.isMesh) dirtTotal++;
        });
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    
    if (controls.isLocked) {
        if (isWashing) {
            document.getElementById('stream').style.display = 'block';
            
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            let intersects = raycaster.intersectObjects(scene.children, true);
            
            // СТРУЯ ВОДЫ УДАЛЯЕТ ГРЯЗЬ
            if (intersects.length > 0) {
                let hit = intersects[0].object;
                if (hit.name.includes("Dirt")) {
                    hit.visible = false; // Грязь исчезает!
                    hit.position.set(0, -100, 0); // Убираем её из мира
                    dirtRemoved++;
                    
                    let p = Math.floor((dirtRemoved / dirtTotal) * 100);
                    document.getElementById('percent').innerText = p;
                    document.getElementById('progress-fill').style.width = p + '%';
                }
            }
        } else {
            document.getElementById('stream').style.display = 'none';
        }
    }
    
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
