<!DOCTYPE html>
<html>
<head>
    <title>ICE BREAKER: THE GAME</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: fixed; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
<div id="ui">
    <h1>ICE BREAKER ВЕРСИЯ 1.0 🐧</h1>
    <p>WASD - Ходить | ЛКМ - Удар!</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, penguin;
let keys = {};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    let sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // Пол
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0xffffff}));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // ЗАГРУЗКА ТВОЕГО ПИНГВИНА
    const loader = new THREE.GLTFLoader();
    loader.load('Ice_Breaker.glb', function(gltf) {
        penguin = gltf.scene;
        penguin.scale.set(1, 1, 1); // Можно изменить размер здесь
        scene.add(penguin);
        console.log("Ice_Breaker загружен!");
    }, undefined, function(error) {
        console.error("Ошибка загрузки! Проверь, что файл Ice_Breaker.glb в той же папке.");
    });

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(penguin) {
        if(keys['KeyW']) penguin.position.z -= 0.1;
        if(keys['KeyS']) penguin.position.z += 0.1;
        if(keys['KeyA']) penguin.position.x -= 0.1;
        if(keys['KeyD']) penguin.position.x += 0.1;
        
        camera.position.lerp(new THREE.Vector3(penguin.position.x, penguin.position.y + 5, penguin.position.z + 10), 0.1);
        camera.lookAt(penguin.position);
    }
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
